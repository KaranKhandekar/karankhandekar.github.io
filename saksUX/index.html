<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saks Fifth Avenue | UX Project Variants</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-grey: #767676;
            --color-border: #e2e2e2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Roboto Condensed", sans-serif;
            background-color: var(--color-white);
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            margin-bottom: 80px;
        }

        .logo-text {
            font-family: "Noto Serif", serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--color-grey);
            margin-bottom: 60px;
        }

        .design-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .design-link {
            display: block;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: 1px solid var(--color-border);
            text-decoration: none;
            color: var(--color-black);
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .design-link:hover {
            border-color: var(--color-black);
            background-color: var(--color-black);
            color: var(--color-white);
            transform: translateY(-5px);
        }

        .design-num {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .design-name {
            font-family: "Noto Serif", serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .design-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            border: 1px solid currentColor;
            border-radius: 999px;
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .footer {
            margin-top: 80px;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--color-grey);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <main class="container">
        <header class="header">
            <img src="assets/Saks_Fifth_Avenue_Logo_2.png" alt="Saks Fifth Avenue" style="height: 48px; margin-bottom: 20px;">
            <div class="subtitle">UX Design Variants</div>
        </header>

        <nav class="design-list">
            <a href="index1.html" class="design-link">
                <span class="design-num">01</span>
                <span class="design-name">Design 1</span>
            </a>

            <a href="index2.html" class="design-link">
                <span class="design-num">02</span>
                <span class="design-name">Design 2</span>
            </a>

            <a href="index3.html" class="design-link">
                <span class="design-num">03</span>
                <span class="design-name">Design 3</span>
            </a>

            <a href="index4.html" class="design-link">
                <span class="design-num">04</span>
                <span class="design-name">Design 4</span>
            </a>
        </nav>

        <footer class="footer">
            Select a variant to begin
        </footer>
    </main>

</body>
</html>
